<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kauan Gramkow</title>
    <style>
        body {
            background-color: #f3f4f6;
            /*Muda cor do fundo*/
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            margin: 0;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }

        .perfil {
            text-align: center;
            margin-bottom: 30px;
        }

        .perfil img {
            border: 4px solid;
            height: 100px;
            width: 100px;
            border-radius: 50%;
        }

        .links {
            width: 90%;
            max-width: 400px;

        }

        .botao {
            display: block;
            background-color: #fff;
            color: #333;
            text-decoration: none;
            text-align: center;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid #ddd;
            transition: background 0.3s;
        }

        .botao:hover {
            background-color: #216dbeb2;
            color: #fff;
            border-color: #216dbeb2;
        }
    </style>
</head>

<body>
    <div class="perfil">
        <img src="image/images.jpg">
        <h1>Kauan Gramkow</h1>
        <p>Bem-vindo aos meus links!</p>
    </div>
    <div class="links">
        <a href="https://instagram.com/s7kauan_" class="botao" target="_blank">Instagram</a>
        <a href="https://youtube.com/@valky1527" class="botao" target="_blank">Youtube</a>
        <a href="https://github.com/Valky-7" class="botao" target="_blank">GitHub</a>
    </div><br>
    <footer>&copy; 2026, Kauan Gramkow</footer>
</body>

</html>
